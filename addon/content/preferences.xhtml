<vbox
  xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window });"
>
  <groupbox id="zotero-prefpane-__addonRef__-providerSelector">
    <label
      ><html:h2 data-l10n-id="pref-title">ZoteroTLDR Settings</html:h2></label
    >

    <hbox align="center">
      <label data-l10n-id="pref-active-provider" style="width: 140px"
        >Active Provider:</label
      >
      <html:select
        id="zotero-prefpane-__addonRef__-activeProvider"
        preference="extensions.zotero.__addonRef__.activeProvider"
        style="width: 220px"
      >
        <html:option value="gemini-native" data-l10n-id="pref-provider-gemini"
          >Gemini Native</html:option
        >
        <html:option
          value="openai-compatible"
          data-l10n-id="pref-provider-openai-compatible"
          >OpenAI Compatible</html:option
        >
      </html:select>
    </hbox>

    <hbox>
      <button
        id="zotero-prefpane-__addonRef__-apitest"
        data-l10n-id="pref-api-test"
        label="Test API"
      />
    </hbox>
  </groupbox>

  <groupbox id="zotero-prefpane-__addonRef__-geminiSettings">
    <label
      ><html:h3 data-l10n-id="pref-provider-gemini"
        >Gemini Native</html:h3
      ></label
    >

    <hbox align="center">
      <label data-l10n-id="pref-api-base" style="width: 120px"
        >API Base URL:</label
      >
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-geminiApiBase"
        preference="extensions.zotero.__addonRef__.geminiApiBase"
        style="width: 350px"
      />
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-api-key" style="width: 120px">API Key:</label>
      <html:input
        type="password"
        id="zotero-prefpane-__addonRef__-geminiApiKey"
        preference="extensions.zotero.__addonRef__.geminiApiKey"
        style="width: 350px"
      />
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-model" style="width: 120px">Model:</label>
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-geminiModel"
        preference="extensions.zotero.__addonRef__.geminiModel"
        style="width: 220px"
      />
      <label data-l10n-id="pref-temperature" style="margin-left: 20px"
        >Temperature:</label
      >
      <html:input
        type="number"
        step="0.1"
        min="0"
        max="2"
        id="zotero-prefpane-__addonRef__-geminiTemperature"
        preference="extensions.zotero.__addonRef__.geminiTemperature"
        style="width: 70px"
      />
      <label data-l10n-id="pref-max-output-tokens" style="margin-left: 20px"
        >Max Tokens:</label
      >
      <html:input
        type="number"
        min="1024"
        max="1000000"
        id="zotero-prefpane-__addonRef__-geminiMaxOutputTokens"
        preference="extensions.zotero.__addonRef__.geminiMaxOutputTokens"
        style="width: 100px"
      />
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-pdf-parse-mode" style="width: 120px"
        >PDF Parse Mode:</label
      >
      <html:select
        id="zotero-prefpane-__addonRef__-geminiPdfParseMode"
        preference="extensions.zotero.__addonRef__.geminiPdfParseMode"
        style="width: 180px"
      >
        <html:option value="remote" data-l10n-id="pref-pdf-parse-mode-remote"
          >Remote (upload PDF)</html:option
        >
        <html:option value="local" data-l10n-id="pref-pdf-parse-mode-local"
          >Local (extract text)</html:option
        >
      </html:select>
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-enable-thoughts" style="width: 120px"
        >Enable Thoughts:</label
      >
      <checkbox
        id="zotero-prefpane-__addonRef__-geminiEnableThoughts"
        preference="extensions.zotero.__addonRef__.geminiEnableThoughts"
      />
      <label data-l10n-id="pref-thinking-budget" style="margin-left: 20px"
        >Thinking Budget:</label
      >
      <html:input
        type="number"
        id="zotero-prefpane-__addonRef__-geminiThinkingBudget"
        preference="extensions.zotero.__addonRef__.geminiThinkingBudget"
        style="width: 80px"
      />
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-concurrency" style="width: 120px"
        >Concurrency:</label
      >
      <html:input
        type="number"
        min="1"
        max="10"
        id="zotero-prefpane-__addonRef__-geminiConcurrency"
        preference="extensions.zotero.__addonRef__.geminiConcurrency"
        style="width: 70px"
      />
      <label data-l10n-id="pref-max-chars" style="margin-left: 20px"
        >Max Chars:</label
      >
      <html:input
        type="number"
        min="10000"
        max="2000000"
        id="zotero-prefpane-__addonRef__-geminiMaxChars"
        preference="extensions.zotero.__addonRef__.geminiMaxChars"
        style="width: 110px"
      />
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-rate-limit-count" style="width: 120px"
        >Rate Limit:</label
      >
      <html:input
        type="number"
        min="1"
        max="100"
        id="zotero-prefpane-__addonRef__-geminiRateLimitCount"
        preference="extensions.zotero.__addonRef__.geminiRateLimitCount"
        style="width: 70px"
      />
      <label data-l10n-id="pref-rate-limit-per" style="margin-left: 5px"
        >requests per</label
      >
      <html:input
        type="number"
        min="1"
        max="60"
        id="zotero-prefpane-__addonRef__-geminiRateLimitWindowMinutes"
        preference="extensions.zotero.__addonRef__.geminiRateLimitWindowMinutes"
        style="width: 70px"
      />
      <label data-l10n-id="pref-rate-limit-minutes" style="margin-left: 5px"
        >minutes</label
      >
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-attachment-filter" style="width: 120px"
        >PDF Filter:</label
      >
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-geminiAttachmentFilter"
        preference="extensions.zotero.__addonRef__.geminiAttachmentFilter"
        style="width: 250px"
      />
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-max-file-size" style="width: 120px"
        >Max File Size:</label
      >
      <html:input
        type="number"
        min="0"
        max="500"
        id="zotero-prefpane-__addonRef__-geminiMaxFileSizeMB"
        preference="extensions.zotero.__addonRef__.geminiMaxFileSizeMB"
        style="width: 70px"
      />
      <label data-l10n-id="pref-max-file-size-help" style="margin-left: 5px"
        >MB (0=no limit)</label
      >
      <label data-l10n-id="pref-max-pages" style="margin-left: 20px"
        >Max Pages:</label
      >
      <html:input
        type="number"
        min="0"
        max="10000"
        id="zotero-prefpane-__addonRef__-geminiMaxPageCount"
        preference="extensions.zotero.__addonRef__.geminiMaxPageCount"
        style="width: 70px"
      />
      <label data-l10n-id="pref-no-limit-help" style="margin-left: 5px"
        >(0=no limit)</label
      >
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-skip-existing-summary" style="width: 120px"
        >Skip Summarized:</label
      >
      <checkbox
        id="zotero-prefpane-__addonRef__-geminiSkipExistingSummary"
        preference="extensions.zotero.__addonRef__.geminiSkipExistingSummary"
      />
      <label data-l10n-id="pref-retry-transient" style="margin-left: 20px"
        >Retry on transient errors:</label
      >
      <html:input
        type="number"
        min="0"
        max="10"
        id="zotero-prefpane-__addonRef__-geminiRetryOnTransientErrors"
        preference="extensions.zotero.__addonRef__.geminiRetryOnTransientErrors"
        style="width: 60px"
      />
      <label data-l10n-id="pref-times" style="margin-left: 5px">times</label>
    </hbox>

    <vbox>
      <label data-l10n-id="pref-prompt">Prompt Template:</label>
      <html:textarea
        id="zotero-prefpane-__addonRef__-geminiPrompt"
        preference="extensions.zotero.__addonRef__.geminiPrompt"
        rows="8"
        style="width: 100%"
      />
    </vbox>
  </groupbox>

  <groupbox id="zotero-prefpane-__addonRef__-openaiCompatibleSettings">
    <label
      ><html:h3 data-l10n-id="pref-provider-openai-compatible"
        >OpenAI Compatible</html:h3
      ></label
    >

    <hbox align="center">
      <label data-l10n-id="pref-api-base" style="width: 120px"
        >API Base URL:</label
      >
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-openaiCompatibleApiBase"
        preference="extensions.zotero.__addonRef__.openaiCompatibleApiBase"
        style="width: 350px"
      />
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-api-key" style="width: 120px">API Key:</label>
      <html:input
        type="password"
        id="zotero-prefpane-__addonRef__-openaiCompatibleApiKey"
        preference="extensions.zotero.__addonRef__.openaiCompatibleApiKey"
        style="width: 350px"
      />
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-model" style="width: 120px">Model:</label>
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-openaiCompatibleModel"
        preference="extensions.zotero.__addonRef__.openaiCompatibleModel"
        style="width: 300px"
      />
      <label data-l10n-id="pref-temperature" style="margin-left: 20px"
        >Temperature:</label
      >
      <html:input
        type="number"
        step="0.1"
        min="0"
        max="2"
        id="zotero-prefpane-__addonRef__-openaiCompatibleTemperature"
        preference="extensions.zotero.__addonRef__.openaiCompatibleTemperature"
        style="width: 70px"
      />
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-max-output-tokens" style="width: 120px"
        >Max Tokens:</label
      >
      <html:input
        type="number"
        min="1024"
        max="1000000"
        id="zotero-prefpane-__addonRef__-openaiCompatibleMaxOutputTokens"
        preference="extensions.zotero.__addonRef__.openaiCompatibleMaxOutputTokens"
        style="width: 110px"
      />
      <label data-l10n-id="pref-pdf-parse-mode" style="margin-left: 20px"
        >PDF Parse Mode:</label
      >
      <html:select
        id="zotero-prefpane-__addonRef__-openaiCompatiblePdfParseMode"
        preference="extensions.zotero.__addonRef__.openaiCompatiblePdfParseMode"
        style="width: 180px"
      >
        <html:option value="remote" data-l10n-id="pref-pdf-parse-mode-remote"
          >Remote (upload PDF)</html:option
        >
        <html:option value="local" data-l10n-id="pref-pdf-parse-mode-local"
          >Local (extract text)</html:option
        >
      </html:select>
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-enable-thoughts" style="width: 120px"
        >Enable Thoughts:</label
      >
      <checkbox
        id="zotero-prefpane-__addonRef__-openaiCompatibleEnableThoughts"
        preference="extensions.zotero.__addonRef__.openaiCompatibleEnableThoughts"
      />
      <label data-l10n-id="pref-thinking-budget" style="margin-left: 20px"
        >Thinking Budget:</label
      >
      <html:input
        type="number"
        id="zotero-prefpane-__addonRef__-openaiCompatibleThinkingBudget"
        preference="extensions.zotero.__addonRef__.openaiCompatibleThinkingBudget"
        style="width: 80px"
      />
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-concurrency" style="width: 120px"
        >Concurrency:</label
      >
      <html:input
        type="number"
        min="1"
        max="10"
        id="zotero-prefpane-__addonRef__-openaiCompatibleConcurrency"
        preference="extensions.zotero.__addonRef__.openaiCompatibleConcurrency"
        style="width: 70px"
      />
      <label data-l10n-id="pref-max-chars" style="margin-left: 20px"
        >Max Chars:</label
      >
      <html:input
        type="number"
        min="10000"
        max="2000000"
        id="zotero-prefpane-__addonRef__-openaiCompatibleMaxChars"
        preference="extensions.zotero.__addonRef__.openaiCompatibleMaxChars"
        style="width: 110px"
      />
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-rate-limit-count" style="width: 120px"
        >Rate Limit:</label
      >
      <html:input
        type="number"
        min="1"
        max="100"
        id="zotero-prefpane-__addonRef__-openaiCompatibleRateLimitCount"
        preference="extensions.zotero.__addonRef__.openaiCompatibleRateLimitCount"
        style="width: 70px"
      />
      <label data-l10n-id="pref-rate-limit-per" style="margin-left: 5px"
        >requests per</label
      >
      <html:input
        type="number"
        min="1"
        max="60"
        id="zotero-prefpane-__addonRef__-openaiCompatibleRateLimitWindowMinutes"
        preference="extensions.zotero.__addonRef__.openaiCompatibleRateLimitWindowMinutes"
        style="width: 70px"
      />
      <label data-l10n-id="pref-rate-limit-minutes" style="margin-left: 5px"
        >minutes</label
      >
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-attachment-filter" style="width: 120px"
        >PDF Filter:</label
      >
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-openaiCompatibleAttachmentFilter"
        preference="extensions.zotero.__addonRef__.openaiCompatibleAttachmentFilter"
        style="width: 250px"
      />
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-max-file-size" style="width: 120px"
        >Max File Size:</label
      >
      <html:input
        type="number"
        min="0"
        max="500"
        id="zotero-prefpane-__addonRef__-openaiCompatibleMaxFileSizeMB"
        preference="extensions.zotero.__addonRef__.openaiCompatibleMaxFileSizeMB"
        style="width: 70px"
      />
      <label data-l10n-id="pref-max-file-size-help" style="margin-left: 5px"
        >MB (0=no limit)</label
      >
      <label data-l10n-id="pref-max-pages" style="margin-left: 20px"
        >Max Pages:</label
      >
      <html:input
        type="number"
        min="0"
        max="10000"
        id="zotero-prefpane-__addonRef__-openaiCompatibleMaxPageCount"
        preference="extensions.zotero.__addonRef__.openaiCompatibleMaxPageCount"
        style="width: 70px"
      />
      <label data-l10n-id="pref-no-limit-help" style="margin-left: 5px"
        >(0=no limit)</label
      >
    </hbox>

    <hbox align="center">
      <label data-l10n-id="pref-skip-existing-summary" style="width: 120px"
        >Skip Summarized:</label
      >
      <checkbox
        id="zotero-prefpane-__addonRef__-openaiCompatibleSkipExistingSummary"
        preference="extensions.zotero.__addonRef__.openaiCompatibleSkipExistingSummary"
      />
      <label data-l10n-id="pref-retry-transient" style="margin-left: 20px"
        >Retry on transient errors:</label
      >
      <html:input
        type="number"
        min="0"
        max="10"
        id="zotero-prefpane-__addonRef__-openaiCompatibleRetryOnTransientErrors"
        preference="extensions.zotero.__addonRef__.openaiCompatibleRetryOnTransientErrors"
        style="width: 60px"
      />
      <label data-l10n-id="pref-times" style="margin-left: 5px">times</label>
    </hbox>

    <vbox>
      <label data-l10n-id="pref-prompt">Prompt Template:</label>
      <html:textarea
        id="zotero-prefpane-__addonRef__-openaiCompatiblePrompt"
        preference="extensions.zotero.__addonRef__.openaiCompatiblePrompt"
        rows="8"
        style="width: 100%"
      />
    </vbox>
  </groupbox>

  <hbox align="center" style="margin-top: 10px; gap: 10px">
    <label value="v__buildVersion__" style="color: #888; font-size: 11px" />
    <label data-l10n-id="pref-github-label" style="color: #888; font-size: 11px"
      >GitHub:</label
    >
    <html:input
      type="text"
      readonly="true"
      value="https://github.com/XuZhiangDLUT/ZoteroTLDR"
      style="
        width: 280px;
        font-size: 11px;
        color: #0066cc;
        border: 1px solid #ccc;
        padding: 2px 4px;
      "
      onclick="this.select();"
    />
  </hbox>
</vbox>
